# RentecDirect session keepalive configuration
# The Open Claw agent can edit these values when instructed

# How often to run the keepalive (in days)
KEEPALIVE_INTERVAL_DAYS=1

# Time of day to run the keepalive (24h format, VPS local time)
KEEPALIVE_TIME=03:00

# Path to the persistent Chrome profile directory on the VPS
# This directory stores all browser state including Cloudflare cookies
RENTEC_PROFILE_DIR=$HOME/.agent-browser/profiles/rentec-agent
